name: Deploy to VPS on production

on:
  push:
    branches:
      - production

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies and build
        run: |
          npm install
          npm run build

      - name: Copy build files to VPS
        run: |
          rsync -avz --delete ./dist/ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:~/VibSens_build/
        env:
          RSYNC_RSH: 'ssh -i ${{ secrets.VPS_SSH_PRIVATE_KEY }} -o StrictHostKeyChecking=no'

      - name: Link build dir to /var/www/VibSens on VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          port: 22
          script: |
            sudo rm -rf /var/www/VibSens
            sudo ln -s ~/VibSens_build /var/www/VibSens
