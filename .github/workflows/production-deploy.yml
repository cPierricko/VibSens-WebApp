name: Deploy on Production merge

on:
  push:
    branches:
      - Production

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build project
        run: |
          npm install
          npm run build

      - name: Deploy via SSH to VPS
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.VPS_IP }}
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /home/deploy/VibeSens
            git pull origin Production
            npm install
            npm run build
            rm -rf /var/www/VibSens/*
            ln -s /home/deploy/VibeSens/build /var/www/VibSens
